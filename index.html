<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Vocab Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="themeToggle" onclick="toggleTheme()" style="position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 24px; cursor: pointer;">🌙</button>
  <div class="container">
    <h2>📚 Save a Word</h2>
    <input type="text" id="wordInput" placeholder="Enter a new English word..." autocomplete="off">
    <button id="saveBtn" onclick="saveWord()">Auto-Fill & Save</button>
    <div id="status"></div>
    <div id="dashboard" style="margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px;">
      <h3 style="margin-bottom: 5px;">📊 Your Progress</h3>
      <p id="totalCount" style="color: #666; font-size: 14px; margin-top: 0;">Total Words Mastered: Loading...</p>
      
      <div id="recentWords" style="margin-top: 15px;">
        </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
